const TERMS = {
  "100,000 Bonus Miles": `New Cardmember Bonus – 100,000 Miles: To qualify, you must make $5,000 in purchases during the first 3 months from account opening. After qualifying, please allow 6 to 8 weeks for bonus to post to your United MileagePlus account. To be eligible for this bonus offer, your credit card account must be open and not in default at the time of fulfillment. Purchases are when you, or an authorized user, use a card to make purchases of products and services. However, the following types of transactions won't count as purchases: balance transfers, cash advances, cash-like transactions including, but not limited to: travelers checks, foreign currency, money orders, wire transfers, cryptocurrency, other similar digital or virtual currency and other similar transactions; lottery tickets, casino gaming chips, race track wagers, or similar offline and online betting transactions; person-to-person money transfers and account-funding transactions that transfer currency, any checks that access your account, interest, unauthorized or fraudulent charges, and fees of any kind, including an annual fee, if applicable. These miles do not count toward Premier status. If your account is not open for at least six months, United and Chase reserve the right to deduct the bonus miles from your MileagePlus account.`,

  "2,000 Premier Qualifying Points (PQP)": `2,000 Additional Premier Qualifying Points (PQP): The primary Cardmember will earn 2,000 Premier Qualifying Points (PQP) after you make Purchases totaling $5,000 or more during the first 3 months from account opening. ("Purchases" do not include balance transfers, cash advances, travelers checks, foreign currency, money orders, wire transfers or similar cash-like transactions, lottery tickets, casino gaming chips, race track wagers or similar betting transactions, any checks that access your account, interest, unauthorized or fraudulent charges, and fees of any kind, including an annual fee, if applicable.) After qualifying, please allow 6-8 weeks for these PQP to post to your account. Promotional PQP will post directly to your United MileagePlus account and will not appear on your credit card statement. The promotional 2,000 PQP do not count toward the 4,000 calendar year maximum PQP Cardmembers can earn for net purchases. PQP will apply toward Premier status tiers up to and including Premier 1K®. Qualification requirements for Premier status may vary by MileagePlus program year. To be eligible for this offer, account must be open and not in default at the time of fulfillment. Chase is not responsible for the provision of, or failure to provide, the PQP stated in this offer.

Earn Premier Qualifying Points (PQP) ongoing: The primary Cardmember will earn 1 PQP for every $20 in net purchases (including purchases made by authorized users) up to a maximum of 4,000 PQP within the calendar year.`,

  "10,000 Employee Card Bonus": `10,000 Bonus Miles After You Add An Authorized User In The First 3 Months From Account Opening:
This product is not available to either (i) current Cardmembers of this credit card, or (ii) previous Cardmembers of this credit card who received a new Cardmember bonus for this credit card within the last 24 months. With this bonus offer, you will qualify and receive 10,000 bonus miles after your addition of an authorized user to your account during the first 3 months from account opening. 10,000 bonus miles will only be awarded once, for the first authorized user added to your account regardless of how many total authorized users you add to your account. After qualifying, please allow 6 to 8 weeks for bonus miles to post to your account. To be eligible for this bonus offer, account must be open and not in default, and authorized user must be on your account at the time of fulfillment. These miles do not count toward Premier status. If your account is not open for at least 6 months, United and Chase reserve the right to deduct the bonus miles from your MileagePlus Program account.`,

  "United Travel Credit": `Earn $125 United Travel Credit: Earn one $125 United TravelBank cash each calendar year that you make five (5) United flight travel-related purchases, each totaling $100 or more with your United℠ Business Card. United flight travel-related purchases include seat upgrades; Economy Plus®; inflight food, beverages and Wi-Fi; baggage service charges or other United fees. Travel credit will be delivered in the form of United® TravelBank cash and will be added to your MileagePlus account within 6-8 weeks of your 5th United purchase totaling $100 or more posting to your account.

United Travel Credit usage: United travel credits, in the form of United TravelBank cash, must be used for bookings on a United- or United Express®-operated flight or as otherwise permitted by United, and the reservation must be made prior to the expiration date of the credit. TravelBank cash may not be combined, transferred, extended beyond expiration date, or re-credited for miles. Unused TravelBank cash will expire 12 months after date of issue. TravelBank cash can be used alone or in combination with most other forms of payment. You can't combine TravelBank cash with travel certificates, future flight credit or miles. TravelBank cash credit must be used toward a reservation made within 12 months from the issue date.`,

  "United Hotels Credit": `Up to $100 United Hotels Statement Credit: A statement credit of $50 will be automatically posted to your account for your first and second hotel stays of $50 or more when you book and prepay with your card directly through United Hotels, up to a maximum accumulation of up to $100 annually. Annual means the year beginning with your account open date through the first statement date after your account open date anniversary, and the 12 monthly billing cycles after that each year. To qualify for the statement credit, you must utilize "Pay Now" at booking. Please allow 6 to 8 weeks for statement credit(s) to post to your account. Annual statement credits will be issued for the year in which the transaction posts to your account. Delays by the United Hotels property could extend the transaction date beyond the annual period end date and will be allocated towards the following year's annual United Hotels statement credit maximum of $100. To qualify for this statement credit, account must be open and not in default at the time of fulfillment.`,

  "Rideshare Credit": `$100 Rideshare Statement Credit: Earn up to $8 back as a statement credit each month from January to November and up to $12 back as a statement credit in December when you pay for rideshare purchases using your United℠ Business Card. That means you can earn up to a maximum accumulation of $100 in statement credits each calendar year. You must enroll to receive this benefit. You will receive this benefit starting the day after enrollment, continuing each month through the end of the calendar year. Please allow 6 to 8 weeks for statement credit(s) to post to your account. Eligible purchases will qualify for this benefit the month enrollment is completed and each month thereafter. Statement credit(s) will be issued for the calendar month in which the transaction posts to your account. Delays by the rideshare service could extend the transaction date beyond the calendar month end date and will be allocated toward the following month's credit amount.`,

  "Avis/Budget Car Rental Credit": `Up to $50 Avis or Budget Travel Credit: Earn $25 in United TravelBank cash on your first eligible Avis or Budget purchase and $25 in United TravelBank cash on your second eligible Avis or Budget purchase when you use your United℠ Business Card on Avis or Budget rental car purchases made directly through cars.united.com, up to a maximum accumulation of $50 annually. To be eligible for this offer, the Avis or Budget rental car reservation must be for a minimum of 2 days from a participating Avis/Budget location, the Primary Cardmember must include their MileagePlus® number in the reservation, and one of the following discount codes must be applied: Avis AWD A7915000 or A7909000 or Budget BCD B2049000 or B2048000. You can select "Apply discounted rates" on cars.united.com to apply the discount codes. This Avis Travel credit will be delivered in the form of United® TravelBank cash and will be added to your MileagePlus account within 6-8 weeks after each eligible Avis or Budget rental return.`,

  "Instacart Credits": `Receive one $10 credit per month in the Instacart App: As a United℠ Business Card Primary cardmember, you can receive one $10 credit in your Instacart account each month you have an active Instacart+ membership after you activate your complimentary Chase Instacart+ membership on https://www.instacart.com/p/chase-united from 3/23/2025 through 12/31/2027. Activate a complimentary Chase Instacart+ membership using your eligible Chase credit card. The monthly credit will be made available to you in your Instacart+ account at the beginning of each month and will only be available on that platform for the remainder of that calendar month; the monthly credit will not roll over into a subsequent month. Each monthly credit is only eligible on one purchase of $10 or more made on Instacart.com with one retailer and using your United℠ Business Card. Any unused portion of a monthly credit will not be available for future use. Limit 1 credit per order. Excludes restaurant orders powered by Uber Eats. Benefits end 12/31/27.`,

  "JSX Credit": `$100 JSX Statement Credit: A statement credit will automatically be applied to your account when your card is used to make purchases directly with JSX, up to a maximum accumulation of $100 annually. Annual means the year beginning with your account open date through the first statement date after your account open date anniversary, and the 12 monthly billing cycles after that each year. Please allow 6 to 8 weeks for statement credit(s) to post to your account. Annual statement credits will be issued for the year in which the transaction posts to your account. Delays by JSX could extend the transaction posting date beyond the annual period end date and will be allocated towards the following year's annual JSX statement credit maximum of $100.`,

  "FareLock Credit": `$25 Statement Credit for FareLock Purchases: Earn up to a $25 statement credit when your card is used on FareLock purchases for flights operated by United and United Express® annually. Annual means the year beginning with your account open date through the first statement date after your account open date anniversary, and the 12 monthly billing cycles after that each year. Please allow 6 to 8 weeks for statement credit(s) to post to your account. Statement credits will be issued for the year in which the transaction posts to your account. FareLock is nonrefundable and FareLock prices are not applied to the price of the ticket.`,

  "Free First Checked Bag": `Free Checked Bag: The primary Cardmember and one traveling companion on the same reservation are each eligible to receive their first standard checked bag free; authorized users are only eligible if they are on the same reservation as the primary Cardmember. To receive first standard checked bag free, the primary Cardmember must use their United℠ Business Card to purchase their ticket(s) (this purchase requirement is waived for flights completed during the 90 days following the account open date) and include their MileagePlus® number in their reservation. First standard checked bag free is only available on United- and United Express-operated flights; codeshare partner-operated flights are not eligible. Service charges for oversized, overweight and extra baggage may apply. Cardmembers who are already exempt from other checked baggage service charges will not receive an additional free standard checked bag. For new primary Cardmembers, please allow 2 weeks after account opening for your first free standard checked bag to be available on eligible United reservations.`,

  "2 United Club Passes": `Anniversary United Club Passes: Two (2) United Club℠ one-time passes will be deposited into the primary Cardmember's MileagePlus Program account after account opening and every 12 months thereafter as long as the credit card account remains open. Please allow 4 weeks for your United Club passes to be deposited into your MileagePlus Program account. Each pass grants one person — either the primary Cardmember, employee cardholder, or guests accompanied by the cardmember or employee cardholder — one-time access to a United Club location subject to United Club terms & conditions and Club access policies. Please allow 3 weeks from the date an employee cardholder is added before the employee cardholder redeems a one-time pass without the primary cardmember present. Access is subject to space availability. United Club passes must be presented for admittance to the United Club and can be accessed through the United app or by printing them from your MileagePlus account. United Club passes issued as a Cardmember benefit have no cash value, cannot be sold, gifted or transferred and cannot be replaced if lost or stolen. Each United Club pass is subject to the expiration date located on the pass.`,

  "10% Savings on Award Flights": `Award Flight Pricing: Eligible primary Cardmembers will be eligible to book award flights on United® or United® Express with discounted award pricing. Cardmember award pricing is valid on award flights on United or United Express only; Cardmember award pricing does not apply to Money + Miles tickets, tickets purchased with cash, or other redemption products. Eligible primary Cardmembers without MileagePlus Premier status will be eligible to book award flights on United or United Express with at least 10% fewer miles than the base price paid by members without an eligible card, and Primary Cardmembers with MileagePlus Premier status will be eligible to book award flights on United or United Express with at least 15% fewer miles than the base price paid by members without an eligible card. To receive Award Pricing, the qualifying award reservation must be booked with the primary Cardmember's MileagePlus account. Cardmember award pricing is valid for the primary Cardmember's MileagePlus account only and is not transferrable. The benefit may take up to 5 weeks to become effective after the card is issued.`,

  "Priority Boarding": `Priority Boarding: The primary Cardmember and companions traveling on the same reservation are eligible for priority boarding; authorized users are only eligible if they are on the same reservation as the primary Cardmember. To receive priority boarding, the primary Cardmember must include their MileagePlus® number in their reservation. Priority boarding is only available on United- and United Express-operated flights; codeshare partner-operated flights are not eligible. United℠ Business Cardmembers can board the plane before general boarding, after MileagePlus Premier® members, customers with Premier Access® and travelers requiring special assistance. Please allow 2 weeks after account opening for priority boarding to be available on your United reservation.`,

  "25% Back on Inflight Purchases": `25% back on food, beverage and Wi-Fi purchases on board United and United Express-operated flights and United Club premium drink purchases: You will receive 25% back, in the form of a credit card account statement credit, on purchases of food, beverages and Wi-Fi on board United and United Express-operated flights, and Wi-Fi subscription purchases, when you use your United℠ Business Card to make such purchases. You will also receive 25% back, in the form of a credit card account statement credit, on premium drink purchases at United Clubs. The statement credit will post to your account within 24 hours of your onboard purchase posting to your account. You will also receive 25% back on purchases made by authorized users who use your United Business Card account.`,

  "Economy Plus Upgrades ($25k spend)": `Earn 2 continental U.S. Economy Plus® seat upgrades: The Primary Cardmember will earn 2 credits that can be redeemed to upgrade an Economy seat on an eligible continental U.S. flight to an Economy Plus seat after making Purchases totaling $25,000 or more in a calendar year on your United℠ Business Card. ("Purchases" do not include balance transfers, cash advances, travelers checks, foreign currency, money orders, wire transfers or similar cash-like transactions, lottery tickets, casino gaming chips, race track wagers or similar betting transactions, any checks that access your account, interest, unauthorized or fraudulent charges, and fees of any kind, including an annual fee, if applicable.) After qualifying, please allow 6-8 weeks for the Economy Plus upgrade certificates to post to your account. To receive Economy Plus upgrades, the primary Cardmember must use their United℠ Business Card to purchase their ticket(s) and include their MileagePlus® number in their reservation. Economy Plus Upgrades are valid for Primary Cardmember only and are not transferable. Economy Plus upgrades must be used within 12 months from the issue date. The upgrades are valid for Economy Plus seating (when available) on United and United Express flights within the continental U.S., excluding Alaska and Hawaii.`,

  "5,000-Mile Anniversary Bonus": `5,000 bonus miles each account anniversary year if you also have a personal United credit card: You'll receive 5,000 bonus miles each account anniversary year if you also have a personal United credit card. In order to receive the anniversary bonus miles, you, as the Authorizing Officer of the United business credit card account, must be the primary cardmember on the personal United credit card. Personal United credit cards include all United credit cards without the word "business" in the name that are issued by JPMorgan Chase Bank, N.A. Member FDIC. Both credit card accounts must be open and not in default on the billing cycle end date after your account anniversary date for your United business credit card. Please allow up to 6 weeks after the month in which you qualify for the bonus miles to become available in your MileagePlus account. "Account anniversary year" means the year beginning with your business credit card account open date through the anniversary of the account open date, and each 12 months after that.`,

  "8x Miles on United Flights": `Earning in the Rewards Program: You'll earn miles on purchases of products and services, minus returns or refunds, made with a United℠ credit card by you or an authorized user of the account. Buying products and services with your card, in most cases, will count as a purchase; however, the following types of transactions won't count and won't earn miles: balance transfers, cash advances and other cash-like transactions, lottery tickets, casino gaming chips, race track wagers or similar betting transactions, any checks that access your account, interest, unauthorized or fraudulent charges, and fees of any kind, including an annual fee, if applicable.

2 miles: You'll earn 2 miles total for each $1 spent (1 additional mile on top of the 1 mile per $1 earned on each purchase) on airline tickets purchased from United, and on the following purchases made from United: seat upgrades; Economy Plus®; inflight food, beverages and Wi-Fi; baggage service charges or other United fees. Other United related purchases, such as United Cruises®, United MileagePlus X, DIRECTV® and Merchandise Awards, are excluded. United tickets booked through some discount travel websites or as part of a third-party travel package will also not qualify.

Earning miles from United on United flights and United Hotels: Miles earned on United flights and United Hotels purchased directly from United are earned on the fare and are subject to exclusions. The fare is the base fare of the ticket plus carrier-imposed surcharges or the base fare of the hotel accommodation, excluding any government-imposed taxes and surcharges. Mileage earning differs for Basic Economy or base option tickets and companions traveling on the same reservation.`,

  "2x Miles on Gas/Dining/Office/Transit": `Earning in the Rewards Program – 2 miles: You'll earn 2 miles total for each $1 spent (1 additional mile on top of the 1 mile per $1 earned on each purchase) on purchases of United Card Events from Chase and in the following rewards categories: restaurants; gas stations; office supply stores; local transit and commuting. For important information about Chase rewards categories, see chase.com/RewardsCategoryFAQs.`,

  "1x Miles on Other Purchases": `Earning in the Rewards Program – 1 mile: You'll earn 1 mile for each $1 spent. Buying products and services with your card, in most cases, will count as a purchase; however, the following types of transactions won't count and won't earn miles: balance transfers, cash advances and other cash-like transactions, lottery tickets, casino gaming chips, race track wagers or similar betting transactions, any checks that access your account, interest, unauthorized or fraudulent charges, and fees of any kind, including an annual fee, if applicable.

Information about earning/transferring miles to United: Miles earned during a billing cycle will be automatically transferred to United after the end of each billing cycle.`,

  "Instacart+ Membership (3mo free + 25% off)": `Complimentary Instacart+ membership for 3 months then 25% off: You, as the Primary cardmember, can activate this offer using your eligible United℠ Business Card between 3/23/25 and 12/31/27, to receive three (3) months of complimentary Instacart+ membership beginning on the date you activate this offer and this offer's promotional Instacart+ annual rate. Activate the offer via https://www.instacart.com/p/chase-united or the special offer invitation in your email or account settings.

If you have an existing Instacart+ membership, your existing membership will be paused during the duration of the complimentary term and resume upon expiration of the complimentary term. By activating this offer, you agree to the Instacart+ Terms and that after your complimentary period ends, you will be automatically enrolled at 25% off the then current annual Instacart+ Membership rate (currently $99/year) through 12/31/27, and billed automatically to any active card on file, unless you choose to cancel.

After 12/31/27, your annual membership rate will auto-renew at $99/year, or the then current annual rate. Subscription prices are subject to change. You must pay for your Instacart+ membership using your eligible United℠ Business Card to receive the promotional rate. You may cancel your paid subscription by selecting "Cancel Membership" in the "Your Instacart+ Membership" page. Benefits of Instacart+ membership include $0 delivery fees on eligible orders that total over $35.`,

  { name: "25% Back on Inflight Purchases", desc: "25% back as statement credit on food, beverages, Wi-Fi onboard and Club premium drinks", min: 0, max: 75, default: 15 },
  { name: "Economy Plus Upgrades ($25k spend)", desc: "Earn 2 continental U.S. Economy Plus seat upgrades after $25,000 spend/calendar year", min: 0, max: 200, default: 0 },
  { name: "5,000-Mile Anniversary Bonus", desc: "Earn 5,000 bonus miles/yr if you also have a personal Chase United card. Set to 0¢ if you don't have one.", min: 0, max: 3.0, default: 0, miles: 5000 },

  // Earn Rates (value depends on spend)
  { section: "Earning Potential (annual estimate)", name: "8x Miles on United Flights", desc: "6x from MileagePlus + 2x from card. Estimate based on your annual United spend", min: 0, max: 500, default: 0 },
  { name: "2x Miles on Gas/Dining/Office/Transit", desc: "2x miles at gas stations, restaurants, office supply stores, and local transit", min: 0, max: 300, default: 0 },
  { name: "1x Miles on Other Purchases", desc: "1 mile per $1 on all other purchases", min: 0, max: 200, default: 0 },

  // Protections
  { section: "Travel & Purchase Protections", name: "Auto Rental Coverage (Primary)", desc: "Primary coverage up to $60,000 for theft/collision on rentals (MSRP ≤$125k)", min: 0, max: 100, default: 0 },
  { name: "Baggage Delay Insurance", desc: "Up to $100/day for 3 days for essentials when baggage delayed 6+ hours", min: 0, max: 30, default: 0 },
  { name: "Lost Luggage Reimbursement", desc: "Up to $3,000 per traveler for lost, damaged, or stolen baggage", min: 0, max: 30, default: 0 },
  { name: "Trip Cancellation/Interruption", desc: "Up to $1,500/traveler, $6,000/trip for non-refundable fares if trip canceled", min: 0, max: 50, default: 0 },
  { name: "Trip Delay Reimbursement", desc: "Up to $500/traveler for meals/lodging if delayed 12+ hours or overnight", min: 0, max: 30, default: 0 },
  { name: "Purchase Protection", desc: "Covers new purchases 120 days against damage/theft up to $10,000/item", min: 0, max: 50, default: 0 },
  { name: "Extended Warranty", desc: "Extends manufacturer warranty by 1 year (on warranties ≤3 years)", min: 0, max: 30, default: 0 },

  // Other
  { section: "Other Benefits", name: "No Foreign Transaction Fees", desc: "No 3% fee on international purchases (value depends on international spend)", min: 0, max: 200, default: 0 },
  { name: "Instacart+ Membership (3mo free + 25% off)", desc: "3 months free then 25% off annual rate ($99/yr). Benefits end 12/31/27", min: 0, max: 50, default: 0 },
];

const container = document.getElementById('benefits-container');
let currentSection = '';

function dollarValue(b, sliderVal) {
  return b.miles ? Math.round(b.miles * sliderVal / 100) : sliderVal;
}

function formatDisplay(b, sliderVal) {
  if (b.miles) {
    const dollars = dollarValue(b, sliderVal);
    return `$${dollars} <span style="font-size:0.75rem;color:#666;font-weight:500">(${sliderVal.toFixed(1)}¢/mi)</span>`;
  }
  return `$${sliderVal}`;
}

function formatRangeLabel(b, val) {
  return b.miles ? `${val}¢` : `$${val}`;
}

benefits.forEach((b, i) => {
  if (b.section && b.section !== currentSection) {
    currentSection = b.section;
    container.insertAdjacentHTML('beforeend', `<h2 class="section-title">${b.section}</h2>`);
  }

  const step = b.miles ? 0.1 : 1;

  container.insertAdjacentHTML('beforeend', `
    <div class="benefit-card">
      <div class="benefit-left">
        <div class="benefit-header">
          <span class="benefit-name">${b.name}${TERMS[b.name] ? `<span class="info-icon" onclick="openModal('${b.name.replace(/'/g, "\\'")}')" title="View terms">i</span>` : ''}</span>
          <span class="benefit-value-display" id="val-${i}">${formatDisplay(b, b.default)}</span>
        </div>
        <div class="benefit-desc">${b.desc}</div>
        ${b.comment ? `<div class="benefit-comment">💡 ${b.comment}</div>` : ''}
      </div>
      <div class="benefit-right">
        <canvas class="dist-canvas" id="canvas-${i}" width="240" height="28"></canvas>
        <div class="slider-row">
          <span class="slider-min">${formatRangeLabel(b, b.min)}</span>
          <input type="range" min="${b.min}" max="${b.max}" value="${b.default}" step="${step}" data-index="${i}" oninput="updateValue(this)">
          <span class="slider-max">${formatRangeLabel(b, b.max)}</span>
        </div>
      </div>
    </div>
  `);

  drawDist(i, b.default);
});

function drawDist(i, currentVal) {
  const b = benefits[i];
  const canvas = document.getElementById(`canvas-${i}`);
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Beta-like distribution with mode at default value
  const mode = (b.default - b.min) / (b.max - b.min) || 0.01;
  const concentration = 5;
  const alpha = mode * concentration + 1;
  const beta = (1 - mode) * concentration + 1;

  // Compute PDF values
  const n = w;
  const vals = [];
  let maxVal = 0;
  for (let x = 0; x < n; x++) {
    const t = x / (n - 1);
    const v = Math.pow(t, alpha - 1) * Math.pow(1 - t, beta - 1);
    vals.push(v);
    if (v > maxVal) maxVal = v;
  }

  // Draw filled curve
  ctx.beginPath();
  ctx.moveTo(0, h);
  for (let x = 0; x < n; x++) {
    ctx.lineTo(x, h - (vals[x] / maxVal) * (h - 4));
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = 'rgba(10, 61, 145, 0.12)';
  ctx.fill();

  // Draw curve line
  ctx.beginPath();
  for (let x = 0; x < n; x++) {
    const y = h - (vals[x] / maxVal) * (h - 4);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(10, 61, 145, 0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Draw marker for current value
  const markerX = ((currentVal - b.min) / (b.max - b.min)) * (w - 1);
  ctx.beginPath();
  ctx.moveTo(markerX, h);
  ctx.lineTo(markerX, 2);
  ctx.strokeStyle = '#0a3d91';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function updateValue(el) {
  const i = parseInt(el.dataset.index);
  const val = parseFloat(el.value);
  const b = benefits[i];
  document.getElementById(`val-${i}`).innerHTML = formatDisplay(b, val);
  drawDist(i, val);
  updateSummary();
}

function updateSummary() {
  let ongoing = 0;
  let firstYearBonus = 0;
  document.querySelectorAll('input[type="range"]').forEach(el => {
    const i = parseInt(el.dataset.index);
    const b = benefits[i];
    const val = dollarValue(b, parseFloat(el.value));
    if (b.firstYearOnly) {
      firstYearBonus += val;
    } else {
      ongoing += val;
    }
  });
  const firstYearTotal = ongoing + firstYearBonus;

  document.getElementById('total-benefits').textContent = `$${ongoing}`;
  document.getElementById('total-benefits-y1').textContent = `First year: $${firstYearTotal}`;

  const netOngoing = ongoing - 150;
  const netY1 = firstYearTotal - 150;
  const netEl = document.getElementById('net-value');
  netEl.textContent = (netOngoing >= 0 ? '+' : '') + `$${netOngoing}`;
  netEl.className = 'value ' + (netOngoing >= 0 ? 'positive' : 'negative');
  const netY1El = document.getElementById('net-value-y1');
  netY1El.textContent = `First year: ${netY1 >= 0 ? '+' : ''}$${netY1}`;
  netY1El.className = 'sub-value ' + (netY1 >= 0 ? 'positive' : 'negative');
}

updateSummary();

function openModal(name) {
  const text = TERMS[name];
  if (!text) return;
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-body').textContent = text;
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}

function closeModalIfBackdrop(event) {
  if (event.target.id === 'modal') closeModal();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
