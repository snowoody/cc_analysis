<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Card Value Analyzer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; line-height: 1.5; min-height: 100vh; }
.container { max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }
header { text-align: center; margin-bottom: 36px; }
header h1 { font-size: 2rem; color: #0a3d91; margin-bottom: 6px; }
header p { color: #666; font-size: 0.95rem; max-width: 620px; margin: 0 auto; }

.section-title { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin: 28px 0 14px; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; }

.section-header { display: flex; justify-content: space-between; align-items: center; margin: 28px 0 14px; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; }
.section-header .section-title { margin: 0; padding-bottom: 0; border: none; }
.sort-control { display: flex; align-items: center; gap: 8px; }
.sort-control label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.sort-control select { font-size: 0.85rem; padding: 5px 8px; border-radius: 6px; border: 1px solid #cbd5e1; background: white; color: #1a1a2e; cursor: pointer; outline: none; }
.sort-control select:hover { border-color: #0a3d91; }
.sort-control select:focus { border-color: #0a3d91; box-shadow: 0 0 0 2px rgba(10,61,145,0.15); }

.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

.card-tile { background: white; border-radius: 12px; padding: 20px 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); text-decoration: none; color: inherit; transition: transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; gap: 14px; border: 1px solid transparent; }
.card-tile:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(10,61,145,0.12); border-color: #c7d6f3; }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.card-name { font-size: 1.05rem; font-weight: 700; color: #0a3d91; line-height: 1.3; }
.card-issuer { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
.card-tag { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; background: #e0e7ff; color: #3730a3; white-space: nowrap; }
.card-tag.business { background: #fef3c7; color: #92400e; }
.card-tag.personal { background: #dbeafe; color: #1e40af; }

.card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; padding: 12px 0; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
.stat-item .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-item .stat-value { font-size: 0.95rem; font-weight: 600; color: #1a1a2e; margin-top: 2px; }
.stat-item .stat-value.highlight { color: #0a3d91; }
.stat-item .stat-value.positive { color: #16a34a; }
.stat-item .stat-value.negative { color: #dc2626; }

.card-footer { display: flex; justify-content: space-between; align-items: center; }
.card-categories { display: flex; gap: 6px; flex-wrap: wrap; }
.category-pill { font-size: 0.7rem; padding: 3px 8px; background: #f1f5f9; color: #475569; border-radius: 12px; }
.card-cta { font-size: 0.85rem; font-weight: 600; color: #0a3d91; }
.card-cta::after { content: " →"; }

footer { text-align: center; margin-top: 40px; font-size: 0.75rem; color: #94a3b8; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Credit Card Value Analyzer</h1>
    <p>Estimate the personal value of credit card benefits with adjustable sliders. Pick a card below to start.</p>
  </header>

  <div class="section-header">
    <h2 class="section-title">Available Cards</h2>
    <div class="sort-control">
      <label for="sort-select">Sort by</label>
      <select id="sort-select" onchange="renderCards()">
        <option value="netYear1">Net Value (Year 1)</option>
        <option value="netOngoing">Net Value (Ongoing)</option>
      </select>
    </div>
  </div>
  <div class="card-grid" id="card-grid"></div>

  <footer>Net values are computed from the default slider settings on each card's analysis page.</footer>
</div>

<!-- Load card data files -->
<script src="data/chase-united-business.js"></script>
<script src="data/usbank-triple-cash-business.js"></script>
<script src="data/amex-business-platinum.js"></script>
<script src="data/capitalone-venture.js"></script>
<script src="data/ihg-one-rewards-select.js"></script>
<script src="data/chase-ink-cash.js"></script>

<script>
function dollarValue(b, sliderVal) {
  return b.miles ? Math.round(b.miles * sliderVal / 100) : sliderVal;
}

function computeNetValues(card) {
  let ongoing = 0;
  let firstYearBonus = 0;
  card.benefits.forEach(b => {
    const val = dollarValue(b, b.default);
    if (b.firstYearOnly) firstYearBonus += val;
    else ongoing += val;
  });
  return {
    netOngoing: ongoing - card.annualFee,
    netYear1: ongoing + firstYearBonus - card.annualFee,
  };
}

function fmtSigned(n) {
  return (n >= 0 ? '+' : '') + '$' + n.toLocaleString();
}

function classFor(n) {
  return n >= 0 ? 'positive' : 'negative';
}

const grid = document.getElementById('card-grid');

function renderCards() {
  const sortBy = document.getElementById('sort-select').value;
  const cards = (window.CARDS || []).map(card => {
    const { netOngoing, netYear1 } = computeNetValues(card);
    return { card, netOngoing, netYear1 };
  });
  cards.sort((a, b) => b[sortBy] - a[sortBy]);

  grid.innerHTML = '';
  cards.forEach(({ card, netOngoing, netYear1 }) => {
    const tagClass = (card.type || '').toLowerCase();

    const tile = document.createElement('a');
    tile.href = card.detailUrl;
    tile.className = 'card-tile';
    tile.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-name">${card.name}</div>
          <div class="card-issuer">${card.issuer}${card.network ? ' · ' + card.network : ''}</div>
        </div>
        ${card.type ? `<span class="card-tag ${tagClass}">${card.type}</span>` : ''}
      </div>
      <div class="card-stats">
        <div class="stat-item">
          <div class="stat-label">Annual Fee</div>
          <div class="stat-value">$${card.annualFee}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Sign-On Bonus</div>
          <div class="stat-value highlight">${card.signOnBonusLabel || '—'}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Net Value (Ongoing)</div>
          <div class="stat-value ${classFor(netOngoing)}">${fmtSigned(netOngoing)}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Net Value (Year 1)</div>
          <div class="stat-value ${classFor(netYear1)}">${fmtSigned(netYear1)}</div>
        </div>
      </div>
      <div class="card-footer">
        <div class="card-categories">
          ${(card.categories || []).map(c => `<span class="category-pill">${c}</span>`).join('')}
        </div>
        <span class="card-cta">Analyze</span>
      </div>
    `;
    grid.appendChild(tile);
  });
}

renderCards();
</script>
</body>
</html>
